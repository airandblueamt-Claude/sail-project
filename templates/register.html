<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIL - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <img src="{{ url_for('static', filename='amt-logo.png') }}" alt="AMT" class="auth-logo">
            <h1>SAIL</h1>
            <p class="muted">Create your account</p>
        </div>

        {% if error %}
        <div class="flash flash-error">{{ error }}</div>
        {% endif %}

        <form method="post">
            <div class="form-row">
                <label>Full Name *</label>
                <input type="text" name="name" required class="input" placeholder="e.g. Mohammed Al-Khalifa">
            </div>
            <div class="form-row">
                <label>Email *</label>
                <input type="email" name="email" required class="input" placeholder="name@amt.com">
            </div>
            <div class="form-row">
                <label>Phone</label>
                <input type="text" name="phone" class="input" placeholder="+971 ...">
            </div>
            <div class="form-row">
                <label>Department</label>
                <input type="text" name="department" class="input" placeholder="e.g. IT Operations">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>

        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
    </div>
    <script>
        const saved = localStorage.getItem('sail-theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
    </script>
</body>
</html>
