{% extends "base.html" %}
{% block title %}SAIL - Edit {{ emp.name }}{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <a href="{{ url_for('employees.list_employees') }}" class="breadcrumb">Employees</a>
        <h2>Edit Employee</h2>
    </div>
</div>

<form method="post" class="form-card">
    <div class="form-row">
        <label>Full Name *</label>
        <input type="text" name="name" value="{{ emp.name }}" required class="input">
    </div>
    <div class="form-row-group">
        <div class="form-row">
            <label>Email *</label>
            <input type="email" name="email" value="{{ emp.email or '' }}" required class="input">
        </div>
        <div class="form-row">
            <label>Role</label>
            <select name="role" class="input">
                {% for r in ['employee','technician','manager','admin'] %}
                <option value="{{ r }}" {% if emp.role == r %}selected{% endif %}>{{ r|capitalize }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="form-row">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ emp.phone or '' }}" class="input">
    </div>
    <div class="form-row-group">
        <div class="form-row">
            <label>Department</label>
            <select name="department_id" class="input">
                <option value="">-- None --</option>
                {% for d in departments %}
                <option value="{{ d.id }}" {% if emp.department_id == d.id %}selected{% endif %}>{{ d.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-row">
            <label>Or create new department</label>
            <input type="text" name="department_new" class="input" placeholder="New department name">
        </div>
    </div>
    <div class="form-row">
        <label class="checkbox-label">
            <input type="checkbox" name="is_active" value="1" {% if emp.is_active %}checked{% endif %}>
            Active employee
        </label>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('employees.list_employees') }}" class="btn btn-ghost">Cancel</a>
    </div>
</form>
{% endblock %}
